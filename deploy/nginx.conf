# Load-balances across however many `python-tts` replicas are currently running.
#
# A plain `proxy_pass http://python-tts:8000;` resolves the service's DNS name once at
# startup and caches it — so newly scaled-up replicas would never receive traffic, and a
# replaced/removed replica's stale IP would keep getting requests routed to it. Putting the
# hostname in a variable forces nginx to re-resolve via Docker's embedded DNS (127.0.0.11)
# on every `valid` interval, spreading requests across the current replica set instead.
events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;

    server {
        listen 8000;

        location / {
            set $upstream http://python-tts:8000;
            proxy_pass $upstream;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            # Synthesis takes tens of seconds on CPU (more under replica contention), and a
            # cold model load (first /warmup or /tts on a fresh replica) can take a few
            # minutes to download gated weights — give both plenty of room before nginx gives up.
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
