# Load-balances across however many `python-tts` replicas are currently running.
#
# Uses an `upstream` block with `server ... resolve;` (nginx 1.27.3+ OSS) rather than a plain
# `proxy_pass http://python-tts:8000;` (resolves once at startup, never picks up new/removed
# replicas) or a variable-based `proxy_pass $upstream;` (looks like it re-resolves per request,
# but in practice nginx sticks to a single resolved IP for the life of a keepalive connection —
# tested this directly: with 4 replicas and `set $upstream` + `proxy_pass $upstream`, one replica
# received zero traffic across 4 concurrent requests while another got double-booked). The
# `upstream{}` + `zone` + `resolve` form keeps a live, shared-memory pool of every IP Docker's
# embedded DNS (127.0.0.11) returns for the service name, refreshed every `valid` interval, and
# properly round-robins across all of them — verified this actually spreads load evenly.
events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;

    upstream python_tts {
        zone python_tts 64k;
        server python-tts:8000 resolve;
    }

    server {
        listen 8000;

        location / {
            proxy_pass http://python_tts;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            # Synthesis takes tens of seconds on CPU (more under replica contention), and a
            # cold model load (first /warmup or /tts on a fresh replica) can take a few
            # minutes to download gated weights — give both plenty of room before nginx gives up.
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
